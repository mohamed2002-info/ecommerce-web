<div class="auth-wrapper">

  <!-- LEFT SIDE (form panel) -->
  <div class="left-side">
    <div class="login-area">
      <h2>Create your account</h2>

      <form (ngSubmit)="onSubmit()">
        <label class="field-label" for="signup-name">Name</label>
        <input id="signup-name" type="text" name="name" placeholder="Your name"
          autocomplete="name" [(ngModel)]="name" required />

        <label class="field-label" for="signup-email">Email</label>
        <input id="signup-email" type="email" name="email" placeholder="you@example.com"
          autocomplete="email" [(ngModel)]="email" required />

        <label class="field-label" for="signup-password">Password</label>
        <input id="signup-password" type="password" name="password" placeholder="At least 6 characters"
          autocomplete="new-password" [(ngModel)]="password" required />

        <label class="field-label" for="signup-confirm">Confirm password</label>
        <input id="signup-confirm" type="password" name="password_confirmation" placeholder="Re-enter your password"
          autocomplete="new-password" [(ngModel)]="passwordConfirmation" required />

        <!-- Validation Message Box -->
        <div *ngIf="message" [ngClass]="messageType" class="message-box" role="alert">
          {{ message }}
        </div>

        <button class="auth-button" type="submit" [disabled]="isSubmitting">
          <span *ngIf="isSubmitting" class="btn-spinner" aria-hidden="true"></span>
          {{ isSubmitting ? 'Creating account…' : 'Create Account' }}
        </button>
      </form>

      <div class="auth-links">
        <a [routerLink]="['/login']">Already have an account?</a>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDE (welcome) -->
  <div class="right-side">
    <div class="welcome-box">
      <div class="auth-brand-name">e-commerce</div>

      <p class="sub-text">
        Your destination for premium products, unbeatable prices, and fast delivery.
      </p>
    </div>
  </div>

</div>
