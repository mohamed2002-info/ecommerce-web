<div class="auth-wrapper">
  <div class="left-side">
    <div class="login-area">
      <h2>Forgot your password?</h2>

      <form (ngSubmit)="onSubmit()">
        <label class="field-label" for="forgot-email">Email</label>
        <input
          id="forgot-email"
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Enter your email address"
          autocomplete="email"
          required
        />

        <div *ngIf="message" [ngClass]="messageType" class="message-box" role="alert">
          {{ message }}
        </div>

        <button class="auth-button" type="submit" [disabled]="isSubmitting">
          <span *ngIf="isSubmitting" class="btn-spinner" aria-hidden="true"></span>
          {{ isSubmitting ? 'Sending…' : 'Submit' }}
        </button>
      </form>

      <div class="auth-links">
        <a [routerLink]="['/login']">Login</a>
      </div>
    </div>
  </div>

  <div class="right-side">
    <div class="welcome-box">
      <div class="auth-brand-name">e-commerce</div>
      <p class="sub-text">Your destination for premium products, unbeatable prices, and fast delivery.</p>
    </div>
  </div>
</div>
