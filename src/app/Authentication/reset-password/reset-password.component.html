<div class="auth-wrapper">
  <!-- LEFT SIDE (form panel) -->
  <div class="left-side">
    <div class="login-area">
      <h2>Reset your password</h2>

      <form (ngSubmit)="onSubmit()">
        <label class="field-label" for="reset-new">New password</label>
        <input
          id="reset-new"
          type="password"
          name="newPassword"
          [(ngModel)]="newPassword"
          placeholder="At least 6 characters"
          autocomplete="new-password"
          required
        />

        <label class="field-label" for="reset-confirm">Confirm new password</label>
        <input
          id="reset-confirm"
          type="password"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          placeholder="Re-enter new password"
          autocomplete="new-password"
          required
        />

        <div *ngIf="message" [ngClass]="messageType" class="message-box" role="alert">
          {{ message }}
        </div>

        <button class="auth-button" type="submit" [disabled]="isSubmitting">
          <span *ngIf="isSubmitting" class="btn-spinner" aria-hidden="true"></span>
          {{ isSubmitting ? 'Resetting…' : 'Reset Password' }}
        </button>
      </form>

      <div class="auth-links">
        <a [routerLink]="['/login']">Log In</a>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDE (welcome) -->
  <div class="right-side">
    <div class="welcome-box">
      <div class="auth-brand-name">e-commerce</div>
      <p class="sub-text">
        Your destination for premium products, unbeatable prices, and fast delivery.
      </p>
    </div>
  </div>
</div>
